name: Stale

on:
  schedule:
    # Every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a comment.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if the issue is still relevant.

          # Pull requests
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen if you want to continue this work.

          # Never mark these as stale
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security
