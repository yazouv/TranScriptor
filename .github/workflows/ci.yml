name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    # Skip on release-please branches — they only contain CHANGELOG and version bumps
    if: "!startsWith(github.head_ref, 'release-please--')"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

  # Required to satisfy the branch protection status check on release-please PRs.
  # Both jobs share the same name so GitHub matches either one.
  skip-for-release-please:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    if: "startsWith(github.head_ref, 'release-please--')"

    steps:
      - run: echo "Release-please PR — CI skipped (CHANGELOG and version bump only)"
